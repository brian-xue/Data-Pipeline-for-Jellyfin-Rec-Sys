                      mountPath: /docker-entrypoint-initdb.d
            volumes:
                - name: var-lib-postgresql-data
                  hostPath:
                    path: /mnt/block/postgres_data
                - name: docker-entrypoint-initdb-d
                  hostPath:
                    path: /home/cc/Data-Pipeline-for-Jellyfin-Rec-Sys/db/init
